# GitHub Actions docs
# https://help.github.com/en/articles/about-github-actions
# https://help.github.com/en/articles/workflow-syntax-for-github-actions
name: CI

on:
  # Trigger the workflow on push or pull request,
  # but only for the master branch
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typescript:
    name: Lint application code
    runs-on: ubuntu-24.04

    steps:
      - name: Make checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 25.9.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25.9.0

      - name: Install dependencies
        run: yarn install

      - name: Run `yarn lint:ts`
        run: yarn lint:ts

  lint-scss:
    name: Lint application SCSS files
    runs-on: ubuntu-24.04

    steps:
      - name: Make checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 25.9.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25.9.0

      - name: Install dependencies
        run: yarn install

      - name: Run `yarn lint:scss`
        run: yarn lint:scss

  lint-documentation:
    name: Lint documentation files
    runs-on: ubuntu-24.04

    steps:
      - name: Make checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint all markdown documentation files
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: |
            README.md
            doc/*.md

  check-translations:
    name: Check that translations are up-to-date
    runs-on: ubuntu-24.04

    steps:
      - name: Make checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 25.9.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25.9.0

      - name: Install dependencies
        run: yarn install

      - name: Run `yarn run extract-translations && git diff --exit-code`
        run: yarn run extract-translations && git diff --exit-code

  check-untranslated-text-tags:
    name: Check that there are no untranslated text tags
    runs-on: ubuntu-24.04

    steps:
      - name: Make checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 25.9.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25.9.0

      - name: Install dependencies
        run: yarn install

      - name: Run `yarn run check-translations`
        run: yarn run check-translations

  build:
    name: Build application Docker image
    runs-on: ubuntu-24.04
    needs:
      - lint-typescript
      - lint-scss
      - lint-documentation
      - check-translations
      - check-untranslated-text-tags

    steps:
      - name: Make checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set tag var
        id: vars
        run: echo "DOCKER_TAG=$(echo ${GITHUB_REF} | sed -r 's/[\/()\.]+/_/g')-${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build the Docker image
        run: docker build . --file Dockerfile --build-arg TARGET=production --tag angular-ngrx-frontend:${{ steps.vars.outputs.DOCKER_TAG }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # 0.36.0
        with:
          image-ref: 'angular-ngrx-frontend:${{ steps.vars.outputs.DOCKER_TAG }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
